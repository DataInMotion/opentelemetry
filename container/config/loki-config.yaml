auth_enabled: false
server:
  http_listen_port: 3100
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
limits_config:
  allow_structured_metadata: true
  volume_enabled: true
# Loki ruler: evaluate LogQL alerting rules and push to Alertmanager, so
# log-based alerts share the same pipeline/room as Prometheus metric alerts.
# Rules are mounted read-only at /etc/loki/rules/<tenant>/; tenant is `fake`
# because auth_enabled is false.
ruler:
  alertmanager_url: http://alertmanager:9093
  enable_alertmanager_v2: true
  storage:
    type: local
    local:
      directory: /etc/loki/rules
  rule_path: /tmp/loki-rules
  ring:
    kvstore:
      store: inmemory
