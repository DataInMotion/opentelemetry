name: observability

# =============================================================================
# OpenTelemetry Observability Stack
# =============================================================================
# Services:
#   - OpenTelemetry Collector (receives traces, metrics, logs via OTLP)
#   - Tempo (distributed tracing backend)
#   - Prometheus (metrics storage)
#   - Loki (log aggregation)
#   - Grafana (visualization UI)
#
# Start with: docker compose up -d
# Stop with:  docker compose down
# =============================================================================

services:

  # --- OTel Collector ---
  # Entry point for all telemetry data (traces, metrics, logs)
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.148.0
    command: ["--config=/conf/collector-config.yaml"]
    volumes:
      - ./config/collector-config.yaml:/conf/collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - prometheus
      - loki
    networks:
      - tele-net


  # --- Tempo ---
  # Distributed tracing backend, generates service graphs and span metrics
  tempo:
    image: docker.io/grafana/tempo:2.10.3
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - tele-net

  # --- Prometheus ---
  # Metrics storage, receives data via remote write from collector and Tempo
  prometheus:
    image: docker.io/prom/prometheus:v3.10.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - tele-net

  # --- Loki ---
  # Log aggregation, receives logs via OTLP from collector
  loki:
    image: docker.io/grafana/loki:3.6.7
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./config/loki/rules:/etc/loki/rules:ro
      - loki-data:/loki
    networks:
      - tele-net

  # --- Grafana ---
  # Visualization UI with pre-configured datasources, plugins, and dashboards
  # Anonymous access enabled with Admin role (no login required)
  grafana:
    image: docker.io/grafana/grafana:12.4.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_INSTALL_PLUGINS: "grafana-exploretraces-app,grafana-lokiexplore-app,grafana-metricsdrilldown-app"
    volumes:
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/plugins:/etc/grafana/provisioning/plugins:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
        #    ports:
      #      - "3000:3000"   # Grafana UI
    depends_on:
      - tempo
      - prometheus
      - loki
    networks:
      - tele-net

  # --- Alertmanager ---
  # Receives alerts from Prometheus (metric rules) and Loki (log rules),
  # deduplicates/groups them, and routes critical/warning to the Matrix bridge.
  alertmanager:
    image: docker.io/prom/alertmanager:v0.32.1
    command: ["--config.file=/etc/alertmanager/alertmanager.yaml"]
    volumes:
      - ./config/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
      - alertmanager-data:/alertmanager
    depends_on:
      - matrix-alertmanager-receiver
    networks:
      - tele-net

  # --- Matrix Alertmanager Receiver ---
  # Webhook bridge: turns Alertmanager notifications into Matrix room messages,
  # posting as @alertbot to the Synapse homeserver.
  # This stack runs on a different host than Matrix, so it reaches Synapse over
  # the public endpoint (https://chat.datainmotion.com) — no special network.
  # The runtime config is rendered by config/matrix-receiver/render-config.sh
  # (the image has no shell, so the token is injected on the host).
  matrix-alertmanager-receiver:
    image: docker.io/metio/matrix-alertmanager-receiver:2026.6.3
    command: ["--config-path=/etc/matrix-alertmanager-receiver/config.yaml"]
    volumes:
      - ./config/matrix-receiver/config.yaml:/etc/matrix-alertmanager-receiver/config.yaml:ro
    networks:
      - tele-net

volumes:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
  alertmanager-data:
networks:
  tele-net:
    driver: bridge
    name: tele-net
